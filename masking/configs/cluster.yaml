name: masking-cot-cluster
workload_variant_config:
  workload_type: "training"
  training_fn: masking.training.run.masking_loop
  training_fn_config:
    # ── S3 data source ────────────────────────────────────────────────────────
    # Replace PLACEHOLDER_BUCKET and PLACEHOLDER_PREFIX with your actual bucket
    # and prefix where the WDS shards were written by build_webdataset.py.
    # Example: s3://my-research-bucket/projects/masking/wds
    s3_bucket: "research-datasets-chicago"
    s3_prefix: "nvidia_physicalai_datasets/PhysicalAI-Autonomous-Vehicles/wds"
    local_data_dir: "/mnt/work/tmp/wds_cache"

    # Set to an integer to download only the first N shards (smoke test / debug).
    # Omit or set to null to download all shards.
    max_shards: null

    # ── Model ─────────────────────────────────────────────────────────────────
    checkpoint: "nvidia/Alpamayo-1.5-10B"

    # ── Experiment ────────────────────────────────────────────────────────────
    # "a" — masked vs unmasked trajectory ADE across all clips
    # "b" — per-word steering salience + concept-set ablation
    # "c" — prefix/suffix threshold sweep (ADE vs. CoT word position)
    experiment: "a"
    seed: 0

    # Comma-separated concept words for experiment B ablation
    concepts: "pedestrian,person,cyclist,crosswalk,vehicle,stop,red,light"

    # Word-count thresholds for experiment C prefix/suffix sweep
    threshold_words: [0, 5, 10, 20, 30, 50]

    # Resume from an interrupted run (skips already-written JSONL rows)
    resume: true

    # ── Distributed sharding (auto-set by Lilypad via RANK / WORLD_SIZE) ─────
    # With num_gpus: 8 each replica owns snapshots where hash(clip_id,t0_us) % 8 == rank.
    # Outputs: batch_experiment_{experiment}_rank{RR}.jsonl (one file per GPU).

    # ── Output ────────────────────────────────────────────────────────────────
    outdir: "/mnt/work/tmp/masking_results"

  experiment_tracker:
    wandb:
      entity: research
      project: masking-cot

cluster_resources:
  gpu_machine_type: a100.8
  num_gpus: 8
  customer_resource: research
  preemptible: always
  allowed_regions:
    - us-chicago-1
  requeue_if_preempted: true

runtime_environment:
  # torch==2.7.1 pip install is ~3 GB per worker; allow ample setup time.
  setup_timeout_seconds: 3600

  required_environment_variables:
    - HF_TOKEN

  constant_environment_variables:
    AWS_REQUEST_CHECKSUM_CALCULATION: when_required
    AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    AWS_ENDPOINT_URL_S3: "https://idskhu5vqvtl.compat.objectstorage.us-chicago-1.oraclecloud.com"
    AWS_DEFAULT_REGION: us-chicago-1

  code_assets:
    root_directory: .
    pip_requirements_path: masking/requirements.txt
    regex_excludes:
      - "^build_wds/"
      - "^mnist/"
      - "^research-core/"
      - "^docker/"
      - "^lockfiles/"
