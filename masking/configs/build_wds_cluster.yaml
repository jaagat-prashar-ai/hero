name: build-physicalai-wds
workload_variant_config:
  workload_type: "generic"
  entrypoint_fn: masking.data.build_wds_worker.build_wds_loop
  entrypoint_fn_config:
    bucket: "research-datasets-chicago"
    prefix: "nvidia_physicalai_datasets/PhysicalAI-Autonomous-Vehicles/wds"
    # hf_token: set via -o flag at launch or HF_TOKEN env var on the cluster
    workers: 8
    clips_per_shard: 50
    splits:
      - train
      - val
      - test
    skip_metadata_upload: false
    rank: 0
    world_size: 32

cluster_resources:
  gpu_machine_type: a100.8
  num_gpus: 1
  customer_resource: research
  preemptible: always
  allowed_regions:
    - us-chicago-1
  requeue_if_preempted: true

runtime_environment:
  code_assets:
    root_directory: ../..
    pip_requirements_path: masking/requirements.txt
