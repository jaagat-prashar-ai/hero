name: build-physicalai-wds
workload_variant_config:
  workload_type: "generic"
  entrypoint_fn: masking.data.build_wds_worker.build_wds_loop
  entrypoint_fn_config:
    bucket: "research-datasets-chicago"
    prefix: "nvidia_physicalai_datasets/PhysicalAI-Autonomous-Vehicles/wds"
    hf_token: ""  # set via -o flag at launch: -o workload_variant_config.entrypoint_fn_config.hf_token $HF_TOKEN
    workers: 8
    clips_per_shard: 50
    splits:
      - train
      - val
      - test
    skip_metadata_upload: false
    rank: 0
    world_size: 64
    max_clips: null  # set via -o for smoke tests; null = process all clips

cluster_resources:
  num_cpu_nodes: 64
  customer_resource: research
  preemptible: always
  allowed_regions:
    - us-chicago-1
  requeue_if_preempted: true

runtime_environment:
  setup_timeout_seconds: -1  # pip aiobotocore backtracking can take 8+ min; no timeout
  constant_environment_variables:
    PIP_IGNORE_REQUIRES_PYTHON: "1"  # allows physical_ai_av to install on Python 3.10 workers
    AWS_ENDPOINT_URL_S3: "https://idskhu5vqvtl.compat.objectstorage.us-chicago-1.oraclecloud.com"
  required_environment_variables:
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
  code_assets:
    root_directory: ../..
    pip_requirements_path: masking/requirements.txt
