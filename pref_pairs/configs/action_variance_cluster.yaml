name: pref-pairs-action-variance-cluster
model_identifier: other.training.alpamayo15.default.v1
workload_variant_config:
  workload_type: "training"
  training_fn: pref_pairs.training.run.pref_pairs_loop
  training_fn_config:
    # ── S3 data source ────────────────────────────────────────────────────────
    # 9 scenario types (event_cluster) x up to 100 clips each -- built with:
    #   python -m masking.data.sample_clips \
    #     --hf_token $HF_TOKEN --n_per_type 100 \
    #     --clusters ANIMALS_BIRDS_ROADKILL,COMPLEX_INTERSECTION_INTERACTION,CYCLISTS_AND_MICROMOBILITY_COMPLEX,EMERGENCY_INCIDENT_SCENE,OTHER_LONGTAIL,PEDESTRIAN_DENSITY_OR_CLOSE_PROXIMITY,ROAD_DEBRIS_OR_SAFETY_TRACES,SPECIAL_OR_UNCOMMON_VEHICLE_BEHAVIOR,WORK_ZONES_TEMP_TRAFFIC_CONTROL \
    #     --out pref_pairs/configs/sample_clips_action_variance.json
    # A rare cluster may come back with fewer than 100 clips if fewer are
    # uploaded so far (sample_per_type logs this); action_space_variance.py
    # reports the actual n_clips per cluster rather than assuming exactly 100.
    manifest_path: "pref_pairs/configs/sample_clips_action_variance.json"
    bucket: "research-datasets-chicago"

    # ── Model ─────────────────────────────────────────────────────────────────
    checkpoint: "nvidia/Alpamayo-1.5-10B"

    # ── Rollout sampling ──────────────────────────────────────────────────────
    # k=100: this is the whole point of the experiment -- 100 stochastic
    # rollouts of the SAME scene (harvest_scene draws all k in one batched
    # call from one tokenized input, so this really is "same scene, repeated
    # draws", not 100 different scenes). 5x the batch of the Task-1 harvest's
    # k=20 default. CONFIRMED via a canary run (2 scenes, k=100, 1 GPU) that
    # k=100 in a single batched call CUDA-OOMs an 80GB A100 -- max_batch_size
    # below splits it into 5 sequential sub-batches of 20 (the batch size
    # already proven safe in production) rather than one huge batch. See
    # rollout_harvester.py's harvest_scene docstring.
    k: 100
    max_batch_size: 20
    seed: 0
    temperature: 0.6
    top_p: 0.98
    top_k: null

    # ── Maneuver classification thresholds (unused by action_space_variance.py,
    # but pref_pairs_loop always runs classification -- harmless, ignored downstream) ──
    thresholds_config: "pref_pairs/configs/maneuver_thresholds.yaml"

    # Resume from an interrupted run (skips already-written scene_ids).
    resume: true

    # ── Distributed sharding (auto-set by Lilypad via RANK / WORLD_SIZE) ─────
    # With num_gpus: 8 each replica owns scenes where hash(scene_id) % 8 == rank.
    # Outputs: pref_pairs_rollouts_rank{RR}.jsonl (one file per GPU).

    # Omit or set to null to harvest every scene in the manifest.
    max_scenes: null

    # ── Output ────────────────────────────────────────────────────────────────
    # Deliberately a DIFFERENT outdir from the Task-1 harvest's
    # /mnt/work/tmp/pref_pairs_results -- these are two independent runs
    # (different manifest, different k) and must not share a resume state.
    outdir: "/mnt/work/tmp/action_variance_results"

    # ── Result retrieval (see run.py's "RESULT RETRIEVAL" docstring note) ──────
    # CONFIRMED this cluster's /mnt/work is NOT the same filesystem as the
    # submitting workstation's identically-named /mnt/work (two canary runs
    # both wrote outdir successfully per their logs, but outdir never
    # appeared on the workstation) -- outdir above is NOT how this
    # experiment's results actually get retrieved. log_scene_summary=true
    # additionally logs one compact summary line per scene (every scene,
    # ~900 total, small each); log_detailed_scenes=2 additionally logs full
    # per-rollout rows (waypoints + full CoT text) for the first 2 scenes
    # PER RANK (16 scenes total across 8 GPUs) -- bounded regardless of
    # manifest size, since that data is much larger per scene. Fetch both
    # via `python -m pref_pairs.fetch_from_logs --workload_id <id>`.
    log_scene_summary: true
    log_detailed_scenes: 2

  experiment_tracker:
    wandb:
      entity: research
      project: pref-pairs-action-variance

cluster_resources:
  gpu_machine_type: a100.8
  num_gpus: 8
  customer_resource: research
  preemptible: always
  allowed_regions:
    - us-chicago-1
  requeue_if_preempted: true

runtime_environment:
  # torch install is multi-GB per worker; allow ample setup time (same as
  # masking/configs/cluster.yaml and pref_pairs/configs/cluster.yaml).
  setup_timeout_seconds: 3600

  required_environment_variables:
    - HF_TOKEN

  constant_environment_variables:
    AWS_REQUEST_CHECKSUM_CALCULATION: when_required
    AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    AWS_ENDPOINT_URL_S3: "https://idskhu5vqvtl.compat.objectstorage.us-chicago-1.oraclecloud.com"
    AWS_DEFAULT_REGION: us-chicago-1

  code_assets:
    root_directory: .
    pip_requirements_path: pref_pairs/requirements.txt
    regex_excludes:
      - "^build_wds/"
      - "^mnist/"
      - "^research-core/"
      - "^docker/"
      - "^lockfiles/"
