name: pref-pairs-local
workload_variant_config:
  workload_type: "training"
  training_fn: pref_pairs.training.run.pref_pairs_loop
  training_fn_config:
    # ── Data source ───────────────────────────────────────────────────────────
    # Manifest of scenes to harvest -- built by masking.data.sample_clips
    # (see its --all usage example for the "every OOD clip" variant). This
    # path is NOT a full-shard download location like masking's
    # local_data_dir -- iter_clip_events_from_manifest range-reads only the
    # specific clips this manifest points at, directly from S3.
    manifest_path: "pref_pairs/configs/sample_clips_all.json"
    bucket: "research-datasets-chicago"

    # ── Model ─────────────────────────────────────────────────────────────────
    checkpoint: "nvidia/Alpamayo-1.5-10B"

    # ── Rollout sampling (see rollout_harvester.py's module docstring for
    # the seed-control caveat: this seeds the whole K-rollout batch, not
    # each rollout independently -- that granularity isn't exposed upstream) ──
    k: 20
    seed: 0
    temperature: 0.6
    top_p: 0.98
    top_k: null

    # ── Maneuver classification thresholds (shared by trajectory_features.py
    # and classify_maneuvers.py -- see that file for the schema) ──────────────
    thresholds_config: "pref_pairs/configs/maneuver_thresholds.yaml"

    resume: false

    # Cap scenes for a smoke test before committing to the full manifest.
    max_scenes: 2

    # ── Output ────────────────────────────────────────────────────────────────
    outdir: "/tmp/pref_pairs_results"

  experiment_tracker: {}  # no W&B tracking for local runs

cluster_resources:
  gpu_machine_type: local
  num_gpus: 1
  customer_resource: research

runtime_environment:
  code_assets:
    root_directory: .
    pip_requirements_path: pref_pairs/requirements.txt
