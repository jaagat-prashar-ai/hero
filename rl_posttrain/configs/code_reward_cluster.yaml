name: alpamayo-rl-code-reward
model_identifier: other.training.alpamayo15.default.v1
workload_variant_config:
  # "generic" + ray.remote GPU dispatch -- same rationale as cluster.yaml:
  # cosmos-rl fans out to the node's GPUs itself, so this must be one
  # process that sees all of them, not Lilypad's per-rank replicas.
  workload_type: "generic"
  entrypoint_fn: rl_posttrain.training.run.rl_local_test_loop
  entrypoint_fn_config:
    # ── Workspace ─────────────────────────────────────────────────────────────
    # SAME persistent root as cluster.yaml / llm_judge_cluster.yaml on
    # purpose: the expensive venv and converted model checkpoint are
    # reward-mode-independent and get reused; the reasoning dataset and
    # scratch TOML land in their own subpaths
    # (PAI_Reasoning_mini16/, toml/alpamayo_rvla_rl_code.local.toml).
    workspace_dir: "/mnt/work/tmp/alpamayo_rl_job"

    # ── Model ─────────────────────────────────────────────────────────────────
    alpamayo_model: "nvidia/Alpamayo-1.5-10B"

    # ── Reward ────────────────────────────────────────────────────────────────
    # Code-as-a-reward: every rollout's decoded CoC is parsed into typed
    # claims and verified DETERMINISTICALLY -- commitments against the
    # trajectory that SAME rollout produced, perceptual claims against the
    # clip's obstacle.offline tracks (rl_posttrain/rewards/
    # code_reward_entry.py, built on code_as_a_reward/). Mixed with
    # ADE + comfort exactly like the llm_judge runs (shared TOML template),
    # so this canary differs from the judge canary in the reasoning signal
    # only. No Anthropic key needed -- the reward never leaves the node.
    reward_mode: "code"

    # ── Dataset ───────────────────────────────────────────────────────────────
    # Same reasoning-bearing PAI clips as llm_judge (the reward scores CoC
    # text; the download's --labels already include obstacle.offline, which
    # the perceptual verifier reads). Canary-sized, mirroring the judge
    # canary.
    num_reasoning_clips: 16

    # ── Cosmos-RL TOML overrides ────────────────────────────────────────────────
    dp_shard_size: 4
    train_epoch: 15

    # ── W&B ───────────────────────────────────────────────────────────────────
    wandb_project: "alpamayo-rl"
    wandb_experiment: "reasoning_vla_code_reward"
    wandb_entity: "research"

cluster_resources:
  # Full 8-GPU node even for canaries: the recipe needs >=5 GPUs (4-shard
  # policy + 1 vLLM rollout replica) and a100.8 only splits at 1/4/8.
  gpu_machine_type: a100.8
  num_gpus: 8
  customer_resource: research
  # NOT preemptible -- same reasoning as llm_judge_full_cluster.yaml: training
  # has no cosmos-rl resume, so every preemption restarts from step 0 after a
  # ~35 min env rebuild; llm-judge-full run q00jjc (2026-07-23) proved the
  # pool preempts A100 workers every ~2h15m, faster than a full run.
  preemptible: never
  allowed_regions:
    - us-chicago-1
  requeue_if_preempted: true

runtime_environment:
  # Heavy bootstrapped-venv install (torch/vllm/flash-attn from source) --
  # same allowance as cluster.yaml.
  setup_timeout_seconds: 7200

  # UNLIKE llm_judge_cluster.yaml, no ANTHROPIC_API_KEY: the code reward
  # is computed locally on the GPU node.
  required_environment_variables:
    - HF_TOKEN
    - WANDB_API_KEY

  constant_environment_variables:
    AWS_REQUEST_CHECKSUM_CALCULATION: when_required
    AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    AWS_ENDPOINT_URL_S3: "https://idskhu5vqvtl.compat.objectstorage.us-chicago-1.oraclecloud.com"
    AWS_DEFAULT_REGION: us-chicago-1

  code_assets:
    root_directory: .
    pip_requirements_path: rl_posttrain/requirements.txt
    regex_excludes:
      - "^mnist/"
      - "^research-core/"
      - "^docker/"
      - "^lockfiles/"
      - "^build_wds/"
      - "^masking/"
      # pref_pairs/ code must ship: the reward imports
      # pref_pairs.trajectory_features (commitment verification reads its
      # TrajectoryFeatures). code_as_a_reward/ ships too (not excluded) --
      # it IS the reward. Only the 46M generated-results tree stays out.
      - "^pref_pairs/results/"
      - "^autovla/"
      - "^third_party/alpamayo1.5/"
      # perplexity/alpamayo/ar1_venv (8.1G, a checked-out venv) and
      # perplexity/clip_cache (2.1G of sample mp4s) are not needed by this
      # job and would otherwise dominate the code upload.
      - "^perplexity/"
