name: alpamayo-rl-llm-judge
model_identifier: other.training.alpamayo15.default.v1
workload_variant_config:
  # "generic" + ray.remote GPU dispatch -- same rationale as cluster.yaml:
  # cosmos-rl fans out to the node's GPUs itself, so this must be one
  # process that sees all of them, not Lilypad's per-rank replicas.
  workload_type: "generic"
  entrypoint_fn: rl_posttrain.training.run.rl_local_test_loop
  entrypoint_fn_config:
    # ── Workspace ─────────────────────────────────────────────────────────────
    # SAME persistent root as cluster.yaml on purpose: the expensive venv and
    # converted model checkpoint are reward-mode-independent and get reused;
    # the reasoning dataset and scratch TOML land in their own subpaths
    # (PAI_Reasoning_mini/, toml/alpamayo_rvla_rl_llm_judge.local.toml).
    workspace_dir: "/mnt/work/tmp/alpamayo_rl_job"

    # ── Model ─────────────────────────────────────────────────────────────────
    alpamayo_model: "nvidia/Alpamayo-1.5-10B"

    # ── Reward ────────────────────────────────────────────────────────────────
    # LLM-as-judge reasoning reward: every rollout's decoded CoC is scored
    # 0-10 against the trajectory that SAME rollout produced, via the
    # Anthropic API (rl_posttrain/rewards/llm_judge.py -- the single-trace
    # sibling of the validated pref_pairs pairwise judge), mixed with
    # ADE + comfort exactly like the recipe's joint reward. Needs
    # ANTHROPIC_API_KEY (see required_environment_variables).
    reward_mode: "llm_judge"

    # ── Dataset ───────────────────────────────────────────────────────────────
    # llm_judge trains on reasoning-bearing PAI clips (the reward scores CoC
    # text, so rollouts must be prompted from clips whose pipeline emits CoC
    # sections). Mirrors the recipe SKILL's joint-reward default of 16.
    num_reasoning_clips: 16

    # ── Cosmos-RL TOML overrides ────────────────────────────────────────────────
    dp_shard_size: 4
    train_epoch: 15

    # ── W&B ───────────────────────────────────────────────────────────────────
    wandb_project: "alpamayo-rl"
    wandb_experiment: "reasoning_vla_llm_judge"
    wandb_entity: "research"

cluster_resources:
  # Full 8-GPU node even for canaries: the recipe needs >=5 GPUs (4-shard
  # policy + 1 vLLM rollout replica) and a100.8 only splits at 1/4/8.
  gpu_machine_type: a100.8
  num_gpus: 8
  customer_resource: research
  preemptible: always
  allowed_regions:
    - us-chicago-1
  requeue_if_preempted: true

runtime_environment:
  # Heavy bootstrapped-venv install (torch/vllm/flash-attn from source) --
  # same allowance as cluster.yaml.
  setup_timeout_seconds: 7200

  required_environment_variables:
    - HF_TOKEN
    - WANDB_API_KEY
    # The LLM-judge reward calls the Anthropic API from the GPU worker.
    # launch.sh's llm-judge command bridges ~/.creds/anthropic.key into this
    # when unset (same convention as pref_pairs' generators/judges).
    - ANTHROPIC_API_KEY

  constant_environment_variables:
    AWS_REQUEST_CHECKSUM_CALCULATION: when_required
    AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    AWS_ENDPOINT_URL_S3: "https://idskhu5vqvtl.compat.objectstorage.us-chicago-1.oraclecloud.com"
    AWS_DEFAULT_REGION: us-chicago-1

  code_assets:
    root_directory: .
    pip_requirements_path: rl_posttrain/requirements.txt
    regex_excludes:
      - "^mnist/"
      - "^research-core/"
      - "^docker/"
      - "^lockfiles/"
      - "^build_wds/"
      - "^masking/"
      # UNLIKE cluster.yaml, pref_pairs/ code must ship: the judge reward
      # imports pref_pairs.judge_reasoning_pairs (waypoint-table derivation)
      # and pref_pairs.perturbation_generator (credential/JSON helpers).
      # Only the 46M generated-results tree stays excluded.
      - "^pref_pairs/results/"
      - "^autovla/"
      - "^third_party/alpamayo1.5/"
      # perplexity/alpamayo/ar1_venv (8.1G, a checked-out venv) and
      # perplexity/clip_cache (2.1G of sample mp4s) are not needed by this
      # job and would otherwise dominate the code upload.
      - "^perplexity/"
