# Derived verbatim from the vendored recipe's
# toml/alpamayo_rvla_rl_local_test_with_reasoning.toml with exactly one
# change: the [custom.alpamayo] reasoning-grader keys (grader type / cached
# model path / device) are dropped, because the LLM-judge reward
# (rl_posttrain/rewards/aggregated_reward_llm_judge.py) scores reasoning via
# the Anthropic API instead of a local grader checkpoint. The
# [custom.alpamayo.reward] weights keep the same keys/semantics.
# Placeholder paths below (output_dir, model_name_or_path) are patched into
# a scratch copy by rl_posttrain/training/run.py at job time, never edited
# here.

redis = "12800"

[train]
resume = false
epoch = 30
output_dir = "/path/to/alpamayo_cosmos_rl_job/outputs"
epsilon = 1e-6
optm_name = "AdamW"
optm_lr = 2e-6
optm_impl = "fused"
optm_weight_decay = 0.01
optm_betas = [0.9, 0.999]
optm_warmup_steps = 0
optm_grad_norm_clip = 1.0
async_tp_enabled = false
compile = false
param_dtype = "bfloat16"
fsdp_reduce_dtype = "float32"
fsdp_offload = false
fsdp_reshard_after_forward = "default"
train_batch_per_replica = 48
sync_weight_interval = 2
validation_step = 50
validation_batch_per_replica = 4
non_text = true

[validation]
enable = false
# Validation frequency in training steps.
freq = 50
# Validation batch size per rollout replica (defaults to rollout.batch_size if omitted).
batch_size = 4
temperature = 0.6
n_generation = 6


[rollout]
backend = "reasoning_vla_vllm_rollout"
gpu_memory_utilization = 0.8
enable_chunked_prefill = false
n_generation = 12
batch_size = 2
quantization = "none"
seed = 42

[rollout.sampling_config]
temperature = 0.6
top_p = 0.98
repetition_penalty = 1

[policy]
# ReasoningVLA HF checkpoint directory (must include ReasoningVLAConfig)
model_name_or_path = "/path/to/converted_alpamayo_model"
model_max_length = 4096
model_gradient_checkpointing = true

[logging]
logger = ['console', 'wandb']
project_name = "Alpamayo_RL"
experiment_name = "ReasoningVLA_Post_Training"


[train.train_policy]
type = "grpo"
trainer_type = "reasoning_vla_grpo"
dataloader_shuffle = false
dataset.split = "train"
# Enable rank-based dispatch (mesh-rank sharding) so each replica consumes a stable shard.
data_dispatch_as_rank_in_mesh = false
temperature = 1.0
epsilon_low = 0.2
epsilon_high = 0.28
lower_bound_ratio = 10.0
kl_beta = 0.0
mu_iterations = 1
mini_batch = 1
min_filter_prefix_tokens = 1
allowed_outdated_steps = 50

[train.ckpt]
enable_checkpoint = true
save_freq = 50
save_mode = "async"
max_keep = 10

[rollout.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = 1
pp_size = 1
dp_replicate_size = 1

[policy.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = 4
pp_size = 1
dp_replicate_size = 1


[custom.alpamayo]
idx_rng_enable = false
idx_rng_seed = 1234
idx_rng_debug = false


[custom.alpamayo.reward]
traj_l2_weight = 0.2
comfort_weight = 0.0
reasoning_weight = 0.3

[custom.alpamayo.prefetch]

# Prefetch cache size; <= 0 disables node-prefetch (legacy synchronous dataset fetch path). please set this to be train_batch_per_replica * replica per node.
capacity = 16

# Unix socket directory (node-local). Default is /tmp.
# socket_dir = "/tmp"

num_workers = 5
# Log verbosity for node prefetch server/client.
# One of: "off" | "error" | "warn" | "info" | "debug" | "trace"
# - "trace" is very verbose (includes client RPC payload/resp).
log_level = "info"

# Print per-request detailed logs (cache hit/miss, dataset fetch, per-role shm put, latency).
log_request_details = false
